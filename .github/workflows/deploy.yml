name: CI/CD

# 分支 push：仅静态分析；tag push：静态分析 + 部署时在 Actions 编译 Linux 二进制 + rsync + 部署机打包镜像并运行
# 部署机 docker build 只做 COPY 二进制与静态资源，无 golang 镜像；层缓存在部署机本地，不再使用 GHCR
# 使用 Node 24 运行时的 action 版本，避免 Node 20 弃用告警，见 doc/CI_CD.md
permissions:
  contents: read
  actions: read

on:
  push:
    branches: [main, master]
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. 静态分析（分支与 tag 均执行；不编译）
  check:
    name: 1. 静态分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false

      - name: 静态分析
        run: go vet ./...

  # 2. 部署（仅 tag：Actions 编译 build/app，部署机 docker build 打包容器）
  deploy:
    name: 2. 部署
    needs: check
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false

      - name: 编译 Linux 二进制（部署机只 COPY 进镜像，无需 Go）
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/app .

      - name: 同步代码并在部署机构建、启动
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          [ -n "$DEPLOY_HOST" ] || { echo "::error::缺少 Secrets: DEPLOY_HOST"; exit 1; }
          [ -n "$DEPLOY_USER" ] || { echo "::error::缺少 Secrets: DEPLOY_USER"; exit 1; }
          [ -n "$DEPLOY_SSH_KEY$DEPLOY_SSH_KEY_B64" ] || { echo "::error::缺少 Secrets: 至少配置 DEPLOY_SSH_KEY 或 DEPLOY_SSH_KEY_B64"; exit 1; }

          mkdir -p ~/.ssh
          if [ -n "$DEPLOY_SSH_KEY_B64" ]; then
            echo "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || { echo "私钥格式无效"; exit 1; }
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # rsync 默认走 ssh，但不会自动用 -i；须与 SSH_BASE 使用同一私钥，否则会 publickey 失败
          RSYNC_RSH='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes'
          SSH_BASE=(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}")

          echo "[1/3] 解析部署目录..."
          REMOTE_DEST=$("${SSH_BASE[@]}" bash -s << EOF
          export DEPLOY_PATH='${DEPLOY_PATH}'
          printf '%s' "\${DEPLOY_PATH:-\$HOME/hfut-apiserver}"
          EOF
          )
          REMOTE_DEST=$(printf '%s' "$REMOTE_DEST" | tr -d '\r\n')
          echo "远程目录: $REMOTE_DEST"

          echo "[2/3] rsync（含 build/app 与 Dockerfile）..."
          "${SSH_BASE[@]}" "mkdir -p $(printf '%q' "$REMOTE_DEST")"
          rsync -az --delete \
            -e "$RSYNC_RSH" \
            --exclude '.git' \
            --exclude '.github' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DEST}/"

          echo "[3/3] docker build（仅打包预编译二进制，部署机本地缓存层）并启动..."
          "${SSH_BASE[@]}" bash -s << EOF
          set -e
          export DEPLOY_PATH='${DEPLOY_PATH}'
          DEST="\${DEPLOY_PATH:-\$HOME/hfut-apiserver}"
          cd "\$DEST"
          [ -f /.env ] || { echo '::error::需先在宿主机创建 /.env 并填入环境变量'; exit 1; }
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' /.env > /tmp/.env.docker
          [ -s /tmp/.env.docker ] || { echo '::error::/.env 中无有效 KEY=VALUE 格式行'; exit 1; }
          mkdir -p /var/oss && chmod 777 /var/oss

          export DOCKER_BUILDKIT=1
          docker build -t "apiserver:${TAG}" -t apiserver:latest -f Dockerfile .

          docker stop apiserver 2>/dev/null || true
          docker rm apiserver 2>/dev/null || true
          docker run -d --name apiserver --restart unless-stopped -p 8081:8081 -v /var/oss:/oss --env-file /tmp/.env.docker "apiserver:${TAG}"
          sleep 3
          if ! docker ps --filter name=apiserver --filter status=running -q | grep -q .; then
            echo '::error::容器启动失败'
            docker logs apiserver 2>&1 || true
            exit 1
          fi
          echo '=== 部署成功 ==='
          docker image prune -f
          docker ps --filter name=apiserver
          EOF
