name: CI/CD

permissions:
  contents: read
  actions: read
  packages: write

on:
  push:
    branches: [main, master]
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  # 1. 代码检查（push 到 main 时执行，打 tag 时也会执行）
  check:
    name: 1. 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: 静态分析
        run: go vet ./...

      - name: 编译验证
        run: CGO_ENABLED=0 go build -o /dev/null .

  # 2. 编译、构建镜像并推送至 GHCR（仅在打 tag 时执行）
  build:
    name: 2. 编译 & 镜像推送
    needs: check
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: 编译
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/app main.go

      - name: 镜像地址（GHCR 需小写）
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repo }}/apiserver:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repo }}/apiserver:latest

  # 3. 部署（仅在打 tag 时执行，需手动审批）
  deploy:
    name: 3. 部署
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 镜像地址（GHCR 需小写）
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/apiserver:${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: 配置 SSH 并部署
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          set -e
          [ -n "$DEPLOY_HOST" ] || { echo "::error::缺少 Secrets: DEPLOY_HOST"; exit 1; }
          [ -n "$DEPLOY_USER" ] || { echo "::error::缺少 Secrets: DEPLOY_USER"; exit 1; }
          [ -n "$DEPLOY_SSH_KEY$DEPLOY_SSH_KEY_B64" ] || { echo "::error::缺少 Secrets: 至少配置 DEPLOY_SSH_KEY 或 DEPLOY_SSH_KEY_B64"; exit 1; }
          [ -n "$GHCR_TOKEN" ] || { echo "::error::缺少 Secrets: GHCR_TOKEN（PAT with read:packages，用于部署机拉取镜像）"; exit 1; }

          mkdir -p ~/.ssh
          if [ -n "$DEPLOY_SSH_KEY_B64" ]; then
            echo "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || { echo "私钥格式无效"; exit 1; }
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "[1/2] 登录 GHCR 并拉取镜像..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -e
            echo \"$GHCR_TOKEN\" | docker login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin
            docker pull $IMAGE
          "

          echo "[2/2] 替换容器并启动..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "set -e
            [ -f /.env ] || { echo '::error::需先在宿主机创建 /.env 并填入环境变量'; exit 1; }
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' /.env > /tmp/.env.docker
            [ -s /tmp/.env.docker ] || { echo '::error::/.env 中无有效 KEY=VALUE 格式行'; exit 1; }
            mkdir -p /var/oss && chmod 777 /var/oss
            docker stop apiserver 2>/dev/null || true
            docker rm apiserver 2>/dev/null || true
            docker run -d --name apiserver --restart unless-stopped -p 8081:8081 -v /var/oss:/oss --env-file /tmp/.env.docker ${IMAGE}
            sleep 3
            if ! docker ps --filter name=apiserver --filter status=running -q | grep -q .; then
              echo '::error::容器启动失败'
              docker logs apiserver 2>&1 || true
              exit 1
            fi
            echo '=== 部署成功 ==='
            docker image prune -f
            docker ps --filter name=apiserver
          "