name: CI/CD

on:
  push:
    branches: [main, master]

jobs:
  # 步骤 1：代码语法检查
  check:
    name: 1. 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: 语法检查 / 编译验证
        run: |
          go vet ./...
          CGO_ENABLED=0 go build -o /dev/null .

  # 步骤 2：构建镜像
  build:
    name: 2. 构建镜像
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: 编译 Linux 二进制
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/app main.go

      - name: 构建 Docker 镜像
        run: |
          docker build -t apiserver:latest .

      - name: 导出并上传镜像
        run: |
          docker save apiserver:latest | gzip > apiserver.tar.gz

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: apiserver-image
          path: apiserver.tar.gz
