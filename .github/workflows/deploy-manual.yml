# 手动部署：在 Actions 页面点击 "Run workflow" 执行
name: 手动部署

on:
  workflow_dispatch:

jobs:
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: 编译并构建镜像
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/app main.go
          docker build -t apiserver:latest .
          docker save apiserver:latest | gzip > apiserver.tar.gz

      - name: 写入 SSH 密钥
        run: |
          printf '%s\n' "$DEPLOY_SSH_KEY" > deploy_key
          chmod 600 deploy_key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 传输镜像到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: deploy_key
          source: "apiserver.tar.gz"
          target: "/tmp/"
          strip_components: 0

      - name: 替换容器并启动
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: deploy_key
          script: |
            set -e
            docker load < /tmp/apiserver.tar.gz
            rm -f /tmp/apiserver.tar.gz
            docker stop apiserver 2>/dev/null || true
            docker rm apiserver 2>/dev/null || true
            ENV_FILE=""
            [ -f /opt/app/.env ] && ENV_FILE="--env-file /opt/app/.env"
            docker run -d --name apiserver --restart unless-stopped \
              -p 8081:8081 -e SERVER_PORT=8081 -e SERVER_HOST=0.0.0.0 \
              $ENV_FILE apiserver:latest
            echo "部署完成，端口 8081"
