# 手动部署：在 Actions 页面点击 "Run workflow" 执行
name: 手动部署

on:
  workflow_dispatch:

jobs:
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: 编译并构建镜像
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/app main.go
          docker build -t apiserver:latest .
          docker save apiserver:latest | gzip > apiserver.tar.gz

      - name: 配置 SSH 并部署
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
        run: |
          set -e
          mkdir -p ~/.ssh
          # 支持原始私钥或 Base64 编码（Base64 可避免 GitHub 粘贴换行问题）
          if [ -n "$DEPLOY_SSH_KEY_B64" ]; then
            echo "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || { echo "私钥格式无效，请检查 DEPLOY_SSH_KEY 是否正确"; exit 1; }
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "[1/2] 传输镜像到服务器..."
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no apiserver.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"
          echo "[2/2] 替换容器并启动..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" '
            docker load < /tmp/apiserver.tar.gz
            rm -f /tmp/apiserver.tar.gz
            docker stop apiserver 2>/dev/null || true
            docker rm apiserver 2>/dev/null || true
            ENV_OPT=""
            [ -f /opt/app/.env ] && ENV_OPT="--env-file /opt/app/.env"
            docker run -d --name apiserver --restart unless-stopped \
              -p 8081:8081 -e SERVER_PORT=8081 -e SERVER_HOST=0.0.0.0 \
              $ENV_OPT apiserver:latest
            echo "部署完成，端口 8081"
          '
